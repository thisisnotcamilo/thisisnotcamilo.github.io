<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
        
    <title>thisisnotcamilo.com/</title>

    <style>
        * {
            color: #fff;
            background: #000;
        }

        body {
            max-width: 640px;
            margin: auto;
	    padding: 100px 5px 0px 5px;
            font: 12px monospace;
        }

        main {
            padding: 25px 50px;
        }

        a {
            text-decoration: none;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
            -webkit-text-decoration: none;
        }

        a:hover {
            color: #000;
            background: #fff;
            -webkit-text-decoration: none;
            text-decoration: none;
        }

        .container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 20em;
            display: -webkit-box;
            display: -webkit-flex;
            display: -ms-flexbox;
            display: flex;
            -webkit-align-items: center;
            -webkit-box-align: center;
            -ms-flex-align: center;
            align-items: center;
            -webkit-box-pack: center;
            -webkit-justify-content: center;
            -ms-flex-pack: center;
            justify-content: center;
            z-index: -1;
        }

        section {
            -webkit-flex: none;
            -ms-flex: none;
            flex: none;
            text-align: center;
        }

        h1 {
            font-size: 13px;
            font-weight: bold;
        }
        
	h2 {
            font-size: 12px;
            font-weight: lighter;
	    margin-top: 10px;
        }

	p {
	    margin-top: 25px;
	}

	#pubkey {
	    color: #606060;
	}

	#pubkey:hover {
	    color: #ffffff;
	}

        nav {
            margin-top: 15px;
        }

        nav a {
            display: inline-block;
            margin: 0 15px;
            -webkit-text-decoration: none;
            text-decoration: none;
        }

        @media (max-width:500px) {
            main {
                padding: 25px 15px;
            }
        }
    </style>
</head>

<body>
    <main>
        <div>
            <section>
                <h1>Camilo Vargas</h1>
		<h2>Systems and Networks administrator</h2>
                <nav>
                    <a href="https://twitter.com/thisisnotcamilo">Twitter/</a>
                    <a href="https://github.com/thisisnotcamilo">Github/</a>
                </nav>
            </section>
        </div>
    </main>
</body>
</html>
